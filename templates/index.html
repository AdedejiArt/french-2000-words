<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>French Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 680px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }

    /* Range picker */
    .range-form {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 100px; }

    label { font-size: 0.78rem; color: #666; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

    input[type="number"] {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #555; }

    .btn {
      padding: 0.55rem 1.25rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #aaa; cursor: default; }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .score-label { font-size: 0.9rem; color: #666; }
    .score-val { font-size: 1.3rem; font-weight: 600; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #e0e0d8;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.75rem;
    }

    .word-num { font-size: 0.75rem; color: #aaa; margin-bottom: 2px; }
    .english-word { font-size: 1.25rem; font-weight: 600; margin-bottom: 2px; }
    .hint { font-size: 0.78rem; color: #aaa; margin-bottom: 0.75rem; }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .input-row input[type="text"] {
      flex: 1;
      padding: 0.45rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input[type="text"]:focus { border-color: #555; }
    .input-row input:disabled { background: #fafafa; color: #999; }

    .check-btn {
      padding: 0.45rem 1rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .check-btn:hover { background: #333; }
    .check-btn:disabled { background: #ccc; cursor: default; }

    .feedback {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.4rem;
      display: none;
    }
    .feedback.correct { background: #eaf7ee; color: #1a7f3c; display: block; }
    .feedback.wrong   { background: #fdecea; color: #b91c1c; display: block; }

    .example {
      font-size: 0.82rem;
      color: #666;
      line-height: 1.6;
      display: none;
      margin-top: 0.25rem;
    }
    .example.show { display: block; }
    .example em { color: #333; font-style: italic; }

    .empty { text-align: center; color: #aaa; padding: 3rem 0; font-size: 0.95rem; }

    .error-msg { color: #b91c1c; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>🇫🇷 French Quiz</h1>
  <p class="subtitle">2000 most common French words — type the French translation and check your answer.</p>

  <div class="range-form">
    <div class="field">
      <label for="start">From word #</label>
      <input type="number" id="start" value="1" min="1" max="2000" />
    </div>
    <div class="field">
      <label for="end">To word #</label>
      <input type="number" id="end" value="10" min="1" max="2000" />
    </div>
    <button class="btn" id="load-btn" onclick="loadQuiz()">Start quiz</button>
  </div>
  <div class="error-msg" id="error-msg"></div>

  <div id="score-area" style="display:none">
    <div class="score-bar">
      <span class="score-label">Score:</span>
      <span class="score-val" id="score-val">0 / 0</span>
    </div>
  </div>

  <div id="quiz-area">
    <div class="empty">Enter a word range above and hit <strong>Start quiz</strong>.</div>
  </div>
</div>

<script>
  let score = 0;
  let total = 0;
  let answered = {};

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    const el = document.getElementById('error-msg');
    el.textContent = '';
    el.classList.remove('show');
  }

  async function loadQuiz() {
    clearError();
    const start = parseInt(document.getElementById('start').value);
    const end   = parseInt(document.getElementById('end').value);

    if (isNaN(start) || isNaN(end) || start < 1 || end > 2000 || start > end) {
      showError('Please enter a valid range between 1 and 2000.');
      return;
    }
    if (end - start > 99) {
      showError('Maximum range is 100 words at a time.');
      return;
    }

    const btn = document.getElementById('load-btn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const res = await fetch(`/api/words?start=${start}&end=${end}`);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Failed to load words.');
      }
      const words = await res.json();
      renderQuiz(words);
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Start quiz';
    }
  }

  function renderQuiz(words) {
    score = 0;
    total = words.length;
    answered = {};

    document.getElementById('score-area').style.display = 'block';
    document.getElementById('score-val').textContent = `0 / ${total}`;

    const area = document.getElementById('quiz-area');
    area.innerHTML = '';

    words.forEach(w => {
      const hint = w.french.length > 1 ? w.french.map(() => 'masc.|fem.').slice(0,1).join('') + 'masculine | feminine' : '';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="word-num">Word ${w.num}</div>
        <div class="english-word">${escHtml(w.english)}</div>
        ${w.french.length > 1 ? '<div class="hint">masculine | feminine</div>' : '<div class="hint">&nbsp;</div>'}
        <div class="input-row">
          <input type="text" id="inp-${w.num}" placeholder="Type in French…" autocomplete="off" />
          <button class="check-btn" id="btn-${w.num}">Check</button>
        </div>
        <div class="feedback" id="fb-${w.num}"></div>
        <div class="example" id="ex-${w.num}"></div>
      `;
      area.appendChild(card);

      const inp = card.querySelector(`#inp-${w.num}`);
      const btn = card.querySelector(`#btn-${w.num}`);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(w.num); });
      btn.addEventListener('click', () => checkAnswer(w.num));
    });
  }

  async function checkAnswer(num) {
    if (answered[num]) return;

    const inp = document.getElementById(`inp-${num}`);
    const answer = inp.value.trim();
    if (!answer) return;

    const btn = document.getElementById(`btn-${num}`);
    btn.disabled = true;
    btn.textContent = '…';

    try {
      const res = await fetch('/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ num, answer }),
      });
      const data = await res.json();

      answered[num] = true;
      if (data.correct) score++;
      document.getElementById('score-val').textContent = `${score} / ${total}`;

      const fb = document.getElementById(`fb-${num}`);
      const ex = document.getElementById(`ex-${num}`);

      fb.textContent = data.correct
        ? `✓ Correct! ${data.accepted.join(' | ')}`
        : `✗ The answer is: ${data.accepted.join(' | ')}`;
      fb.className = 'feedback ' + (data.correct ? 'correct' : 'wrong');

      ex.innerHTML = `<em>${escHtml(data.example_fr)}</em><br>${escHtml(data.example_en)}`;
      ex.className = 'example show';

      inp.disabled = true;
      btn.textContent = 'Done';
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Check';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Allow Enter on range inputs to start quiz
  document.addEventListener('DOMContentLoaded', () => {
    ['start','end'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') loadQuiz();
      });
    });
  });
</script>
</body>
</html>
